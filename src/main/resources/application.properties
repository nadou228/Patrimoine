server.port=8082

# -------------------------------
# 1. Configuration de la base
# -------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/patris_togo
spring.datasource.username=adm_patrimoine
spring.datasource.password=patrimoine@patris0609
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------
# 2. JPA / Hibernate
# -------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------
# 3. Serveur Spring Boot
# -------------------------------
server.port=8082
server.address=0.0.0.0
  
# -------------------------------
